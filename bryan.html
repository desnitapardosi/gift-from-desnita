<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter PIN</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>

/* BACKGROUND */
body{
margin:0;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background-image:url("https://i.pinimg.com/1200x/6e/3e/41/6e3e4177d24ab0b037c714aa63dffd9e.jpg");
background-size:cover;
background-position:center;
overflow:hidden;
}

/* CARD */
.card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
transition:all 0.8s ease;
}

/* PIN BOX */
.pin-box{
width:40px;
height:40px;
border:2px solid #2b5279;
background:#e8f4ff;
display:inline-block;
margin:5px;
text-align:center;
line-height:40px;
font-size:20px;
border-radius:8px;
}

/* KEYPAD */
.keypad{
margin-top:20px;
}

.keypad button{
width:50px;
height:50px;
margin:5px;
font-size:16px;
cursor:pointer;
border:none;
background:#386693;
color:white;
border-radius:8px;
}

/* CLUE */
.clue{
margin-top:15px;
font-size:14px;
color:#555;
}

/* TRANSISI OVERLAY */
#transition{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
pointer-events:none;
transition:opacity 1s ease;
z-index:999;
}

#transition.active{
opacity:1;
pointer-events:all;
}

/* ANIMASI SUKSES */
.success{
transform:scale(1.2);
opacity:0;
}

</style>
</head>

<body>

<div id="transition"></div>

<div class="card animate__animated animate__fadeIn" id="card">

<h2>Enter PIN</h2>

<div>
<div class="pin-box" id="box1"></div>
<div class="pin-box" id="box2"></div>
<div class="pin-box" id="box3"></div>
<div class="pin-box" id="box4"></div>
</div>

<p class="clue">Clue: your year of birth 🎂</p>

<div class="keypad">

<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<br>

<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<br>

<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<br>

<button onclick="deletePin()">⌫</button>
<button onclick="press(0)">0</button>
<button onclick="checkPin()">✔</button>

</div>

</div>

<script>

let correctPin="2000"
let inputPin=""

function press(num){
if(inputPin.length < 4){
inputPin += num
document.getElementById("box"+inputPin.length).innerHTML="•"
}
}

function deletePin(){
inputPin=inputPin.slice(0,-1)
document.getElementById("box"+(inputPin.length+1)).innerHTML=""
}

function checkPin(){

if(inputPin===correctPin){

let trans=document.getElementById("transition")
let card=document.getElementById("card")

// ✨ animasi card hilang
card.classList.add("success")

// 🌑 fade ke hitam
setTimeout(()=>{
    trans.classList.add("active")
},300)

// 🚀 pindah halaman
setTimeout(()=>{
    window.location.href="hadiah.html"
},1200)

}

else{

alert("PIN salah 😢")

inputPin=""

for(let i=1;i<=4;i++){
document.getElementById("box"+i).innerHTML=""
}

}

}

</script>

</body>
</html>
