<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Cake 🎂</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
body{
  margin:0; height:100vh; overflow:hidden;
  display:flex; justify-content:center; align-items:center; flex-direction:column;
  font-family:Arial;
  background-image:url("https://i.pinimg.com/736x/df/1f/18/df1f18d98dbb98ec2fce13935a6f8203.jpg");
  background-size:cover; background-position:center;
}

#transition{
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:black; opacity:1;
  pointer-events:none; transition:opacity 2.5s ease;
  z-index:999;
}

h1{ color:white; text-shadow:2px 2px 10px black; }
.candle{ font-size:60px; margin-bottom:-60px; transition:0.5s; }
.cake{ font-size:200px; cursor:pointer; animation:cakeMove 2s infinite ease-in-out; }
@keyframes cakeMove{ 0%{transform:translateY(0)} 50%{transform:translateY(-20px)} 100%{transform:translateY(0)} }
.from{ margin-top:10px; font-size:24px; font-weight:bold; color:white; text-shadow:2px 2px 10px black; }

.photos{ margin-top:20px; display:flex; gap:40px; }
.photos img{ width:150px; height:150px; border-radius:50%; object-fit:cover; border:5px solid white; box-shadow:0 10px 30px rgba(0,0,0,0.3); }

.ball{ position:absolute; font-size:40px; animation:bounce 6s linear infinite; }
.ball1{top:10%; left:10%;} .ball2{top:70%; left:20%;} .ball3{top:30%; left:80%;} .ball4{top:80%; left:70%;}
@keyframes bounce{ 0%{transform:translate(0,0)} 25%{transform:translate(300px,200px)} 50%{transform:translate(-200px,300px)} 75%{transform:translate(200px,-200px)} 100%{transform:translate(0,0)} }

.flower{ position:absolute; top:-50px; font-size:30px; animation:fall linear infinite; }
.flower1{left:10%; animation-duration:6s;} .flower2{left:25%; animation-duration:8s;} .flower3{left:40%; animation-duration:7s;} .flower4{left:55%; animation-duration:9s;} .flower5{left:70%; animation-duration:6s;} .flower6{left:85%; animation-duration:8s;}
@keyframes fall{ 0%{transform:translateY(-50px) rotate(0deg);} 100%{transform:translateY(110vh) rotate(360deg);} }
</style>
</head>
<body>

<div id="transition"></div>

<h1>Happy Birthday Sayang 🎉</h1>
<div id="candle" class="candle">🕯️🕯️🕯️</div>
<div class="cake" onclick="blowCandle()">🎂</div>
<p class="from">From Desnita beautiful and seksoy girl 💙</p>

<div class="photos">
<img src="nita.jpeg">
<img src="des.jpeg">
</div>

<div class="ball ball1">⚽</div>
<div class="ball ball2">⚽</div>
<div class="ball ball3">⚽</div>
<div class="ball ball4">⚽</div>
<div class="ball ball1">⚽</div>
<div class="ball ball2">⚽</div>
<div class="ball ball3">⚽</div>
<div class="ball ball4">⚽</div>

<div class="flower flower1">🌸</div>
<div class="flower flower2">🌺</div>
<div class="flower flower3">🌸</div>
<div class="flower flower4">🌺</div>
<div class="flower flower5">🌸</div>
<div class="flower flower6">🌺</div>
<div class="flower flower1">🌸</div>
<div class="flower flower2">🌺</div>
<div class="flower flower3">🌸</div>
<div class="flower flower4">🌺</div>
<div class="flower flower5">🌸</div>
<div class="flower flower6">🌺</div>


<script>
window.onload=function(){
  let trans=document.getElementById("transition");
  setTimeout(()=>{ trans.style.opacity="0"; },200);
}

function blowCandle(){
  document.getElementById("candle").innerHTML = "";
  confetti({particleCount:300,spread:120,origin:{y:0.6}});
  setTimeout(()=>{ confetti({particleCount:400,spread:150,origin:{y:0.5}}); },1000);

  // setelah confetti 5 detik, fade ke surat
  setTimeout(goToLetter,5000);
}

function goToLetter(){
  let trans=document.getElementById("transition");
  trans.style.opacity="1";
  setTimeout(()=>{ window.location.href="surat.html"; },2500);
}
</script>

</body>
</html>
